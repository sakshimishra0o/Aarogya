<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarogya - System Setup</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="image/AAROGYA.PNG">
    <style>
        .setup-container { max-width: 600px; margin: 4rem auto; padding: 2rem; }
        .log-box { background: #0f172a; color: #10b981; padding: 1rem; border-radius: 12px; font-family: monospace; height: 200px; overflow-y: auto; margin: 1.5rem 0; font-size: 0.85rem; }
        .log-entry { margin-bottom: 0.4rem; }
        .log-error { color: #f43f5e; }
        .cred-box { background: #f8fafc; padding: 1.5rem; border-radius: 16px; border: 2px dashed #e2e8f0; margin-bottom: 2rem; }
        .status-pill { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.4rem 1rem; border-radius: 99px; font-size: 0.75rem; font-weight: 700; background: #f1f5f9; color: #64748b; }
        .status-pill.ok { background: #d1fae5; color: #065f46; }
    </style>
</head>
<body style="background: var(--bg-main);">
    <div class="setup-container">
        <div class="card">
            <div style="text-align: center; margin-bottom: 1rem;"><img src="image/AAROGYA.PNG" alt="Logo" style="width:56px; height:56px; border-radius:12px; object-fit:contain;"></div>
            <h1 style="text-align: center; color: var(--primary); margin-bottom: 0.5rem;">System Setup</h1>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Initialize Aarogya Admin Services</p>

            <div class="cred-box">
                <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 800; margin-bottom: 1rem;">Default Credentials</div>
                <div style="margin-bottom: 0.5rem;"><strong>Email:</strong> <code id="c-email">AarogyaCloud@gmail.com</code></div>
                <div><strong>Pass:</strong> <code id="c-pass">Aarogya@1234</code></div>
                <button onclick="copyCreds()" class="btn btn-sm btn-outline" style="margin-top:1.5rem; width:100%;"><i data-lucide="copy" style="width:14px;height:14px;"></i> Copy Credentials</button>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.5rem;">
                <button onclick="setupAdmin()" class="btn btn-primary" id="setup-btn"><i data-lucide="shield-check"></i> Initialize Admin</button>
                <a href="admin.html" class="btn btn-outline"><i data-lucide="log-in"></i> Admin Login</a>
            </div>

            <button onclick="clearAllSessions()" class="btn btn-danger" style="width:100%; opacity:0.8;"><i data-lucide="trash-2"></i> Reset All Sessions</button>

            <div class="log-box" id="log-box">
                <div class="log-entry">Waiting for action...</div>
            </div>

            <div class="status-pill" id="auth-check">
                <i data-lucide="activity" style="width:14px;height:14px;"></i> <span id="auth-check-msg">Checking Firebase Connection...</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, auth } from './scripts/firebase.js';
        import { createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { ref, set, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const logEl = document.getElementById('log-box');
        function addLog(msg, type='') {
            const div = document.createElement('div');
            div.className = `log-entry ${type==='error'?'log-error':''}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        window.setupAdmin = async () => {
            const btn = document.getElementById('setup-btn');
            btn.disabled = true;
            addLog('Starting Admin Initialization...');
            
            const email = 'AarogyaCloud@gmail.com';
            const pass = 'Aarogya@1234';

            try {
                addLog('Attempting to create admin account...');
                const cred = await createUserWithEmailAndPassword(auth, email, pass).catch(e => {
                    if (e.code === 'auth/email-already-in-use') {
                        addLog('Admin account already exists. Updating records...');
                        return signInWithEmailAndPassword(auth, email, pass);
                    }
                    throw e;
                });

                const uid = cred.user.uid;
                addLog(`Auth successful. UID: ${uid}`);

                await set(ref(db, `users/admins/${uid}`), {
                    uid, email, role: 'admin', createdAt: Date.now()
                });
                addLog('Database records initialized.');
                
                document.getElementById('auth-check').classList.add('ok');
                document.getElementById('auth-check-msg').textContent = 'System Ready';
                addLog('SETUP COMPLETE. You can now login to the Admin Panel.', 'success');
            } catch (err) {
                addLog(`ERROR: ${err.message}`, 'error');
            } finally {
                btn.disabled = false;
            }
        };

        window.clearAllSessions = async () => {
            if (!confirm('This will wipe ALL live consultations. Proceed?')) return;
            try {
                await remove(ref(db, 'sessions'));
                addLog('All sessions cleared.');
            } catch (e) { addLog(e.message, 'error'); }
        };

        window.copyCreds = () => {
            const txt = `Email: AarogyaCloud@gmail.com\nPass: Aarogya@1234`;
            navigator.clipboard.writeText(txt);
            alert('Credentials copied!');
        };

        // Pre-flight
        setTimeout(() => {
            if (auth) {
                document.getElementById('auth-check-msg').textContent = 'Firebase Connected';
                document.getElementById('auth-check').classList.add('ok');
                addLog('Firebase bridge active.');
                lucide.createIcons();
            }
        }, 1000);
        
        lucide.createIcons();
    </script>
</body>
</html>
